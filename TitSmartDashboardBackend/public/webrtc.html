<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebRTC Ultra-Low Latency Stream</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; text-align: center; background: #111; color: white;}
        video { width: 80%; max-width: 1000px; border: 2px solid #444; background: black; }
        button { padding: 10px 20px; font-size: 16px; background: #28a745; color: white; border: none; cursor: pointer; margin-bottom: 20px;}
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <h2>Zero-Latency WebRTC Stream (via MediaMTX)</h2>
    <p>This stream bypasses Node.js entirely and connects directly to the Camera via WebRTC.</p>
    
    <button onclick="startWebRTC()">Play Stream</button>
    <br>
    
    <!-- Video player -->
    <video id="video" controls autoplay muted playsinline></video>

    <script>
        // WebRTC implementation
        async function startWebRTC() {
            const videoEl = document.getElementById('video');
            const streamName = 'cam1'; // As configured in mediamtx.yml
            
            // MediaMTX default WebRTC port is 8889
            const whepUrl = `http://${window.location.hostname}:8889/${streamName}/whep`;

            console.log("Requesting WebRTC stream from:", whepUrl);

            const pc = new RTCPeerConnection();

            pc.addTransceiver('video', { direction: 'recvonly' });
            pc.addTransceiver('audio', { direction: 'recvonly' });

            pc.ontrack = (event) => {
                console.log("Track received!", event.track.kind);
                if (videoEl.srcObject !== event.streams[0]) {
                    videoEl.srcObject = event.streams[0];
                }
            };

            const offer = await pc.createOffer();
            await pc.setLocalDescription(offer);

            // Send offer to MediaMTX WHEP endpoint
            const res = await fetch(whepUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/sdp' },
                body: offer.sdp
            });

            if (!res.ok) {
                console.error("Failed to fetch WebRTC SDP answer:", res.statusText);
                alert("Cannot connect to camera. Please check IP/Pass in mediamtx.yml");
                return;
            }

            const answerSdp = await res.text();
            
            await pc.setRemoteDescription({
                type: 'answer',
                sdp: answerSdp
            });
            
            console.log("WebRTC connected successfully!");
        }
    </script>
</body>
</html>
